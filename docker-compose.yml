services:
  argus:
    build: .
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      CLIENT_ORIGIN: "http://localhost:3001"
      NODE_ENV: production
      # Store SQLite database inside the persistent data volume
      DB_PATH: /app/data/intelligence.db
      # Ollama — change host if Ollama runs on a different machine
      OLLAMA_HOST: http://host.docker.internal:11434
      OLLAMA_MODEL: llama3.2
      # Optional: set LOG_LEVEL to debug for verbose output
      LOG_LEVEL: info
      # Optional overrides (uncomment and set as needed):
      # OLLAMA_TEMPERATURE: "0.1"
      # OLLAMA_CTX: "2048"
      # CONFIG_SECRET: your_config_secret
      # WEBHOOK_SECRET: your_webhook_secret
      # AISSTREAM_API_KEY: your_key
      # CONFLICT_GEOJSON_URL: https://example.com/conflict_fronts.geojson
    volumes:
      # Persists intelligence.db and config.json across container restarts
      - argus_data:/app/data
    restart: unless-stopped
    # Allow container to reach Ollama on the host machine (Linux)
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  argus_data:
